name: release

on:
  push:
    tags:
      - "v*"

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build nvim-config-export
        run: nix build .#nvim-config-export --no-link --print-out-paths > store_path.txt

      - name: Package as tar.gz
        run: |
          STORE_PATH=$(cat store_path.txt)
          tar -czf nvim-config-export.tar.gz -C "$STORE_PATH" .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: nvim-config-export.tar.gz
