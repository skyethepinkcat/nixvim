name: release

on:
  push:
    tags:
      - "v*"

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - uses: cachix/cachix-action@v17
        with:
          name: skyethepinkcat
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build
        run: nix build . --no-link

      - name: Build nvim-config-export
        run: nix build .#default-export-archive --impure --no-link --print-out-paths > store_path.txt
      - name: Build simple-config-export
        run: nix build .#simple-export-archive --impure --no-link --print-out-paths > simple_store_path.txt

      - name: Package as tar.gz
        run: |
          STORE_PATH=$(cat store_path.txt)
          cp $STORE_PATH/nvim.tar.gz nvim.tar.gz

      - name: Package simple as tar.gz
        run: |
          STORE_PATH=$(cat simple_store_path.txt)
          cp $STORE_PATH/nvim.tar.gz simple.tar.gz

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release_notes.md
          # trim leading/trailing blank lines
          sed -i -e '/./,$!d' -e ':a' -e '/^\n*$/{$d;N;ba' -e '}' release_notes.md

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          body_path: release_notes.md
          files: >
            *.tar.gz
