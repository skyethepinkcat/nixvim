---
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - "skyethepinkcat"
  - package-ecosystem: "nix"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
    assignees:
      - "skyethepinkcat"
    groups:
      flake-updates:
        patterns:
          - "*"
  - package-ecosystem: "nix"
    directory: "/"
    target-branch: "release-26.05"
    schedule:
      interval: "weekly"
    assignees:
      - "skyethepinkcat"
    groups:
      flake-updates:
        patterns:
          - "*"
